<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoice — HIJIR Admin</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="../css/mobile.css">
  <script src="../../shared/viewport-watch.js"></script>
</head>
<body>
  <div id="topbar"></div>
  <div class="container">
    <h2>Create Invoice</h2>
    <div class="card">
      <div class="form-group"><label>Invoice No.</label><input type="text" id="invNo" readonly></div>
      <div class="form-group"><label>Date</label><input type="date" id="date"></div>
      <div class="form-group"><label>Client</label><select id="clientSel"></select></div>
    </div>
    <div class="flex-between mt-2"><h3>Line Items</h3><button class="btn btn-sm" id="addRow">+ Row</button></div>
    <div id="rows"></div>
    <div class="summary-m">
      <div class="line grand"><span>JUMLAH KESELURUHAN</span><span id="sGrand">0.00</span></div>
    </div>
    <button class="btn btn-block btn-lg mt-2" id="genPdf">Generate PDF</button>
    <a href="clients.html" class="btn btn-ghost btn-block mt-1">← Back to Clients</a>
  </div>

  <div id="bottomnav"></div>

  <script src="../../libs/jspdf.umd.min.js"></script>
  <script src="../../libs/jspdf.plugin.autotable.min.js"></script>
  <script type="module">
    import { guard, getQueryParam } from "../../shared/router.js";
    import { CLIENTS, PACKAGES, findClient } from "../../shared/data.js";
    import { renderAdminLayout } from "../js/layout.js";
    import { buildInvoice } from "../../shared/pdf-generator.js";

    if (guard()) {
      renderAdminLayout("clients", "Invoice");
      document.getElementById("invNo").value = "HJR" + new Date().toISOString().slice(5,10).replace(/-/g,"") + Math.floor(10+Math.random()*90);
      document.getElementById("date").value = new Date().toISOString().slice(0,10);
      const sel = document.getElementById("clientSel");
      sel.innerHTML = CLIENTS.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
      const preId = getQueryParam("clientId"); if (preId && findClient(preId)) sel.value = preId;

      const rowsEl = document.getElementById("rows");
      const pkgOpts = `<option value="">--</option>` + PACKAGES.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
      let rows = [];
      function jumlah(r) { return (+r.price||0)*(+r.qty||0); }
      function fmt(n) { return (+n||0).toLocaleString("en-MY",{minimumFractionDigits:2,maximumFractionDigits:2}); }
      function render() {
        rowsEl.innerHTML = rows.map((r,i) => `
          <div class="item-card-m">
            <div class="row-head"><span>Item ${i+1}</span><button data-del="${i}" style="background:none;border:none;color:var(--danger);font-size:1.1rem">✕</button></div>
            <div class="form-group"><label>Package</label><select data-k="pkgId" data-i="${i}">${pkgOpts}</select></div>
            <div class="form-group"><label>Price/Pax (RM)</label><input type="number" step="0.01" data-k="price" data-i="${i}" value="${r.price||""}"></div>
            <div class="form-group"><label>Unit</label><input type="text" data-k="unit" data-i="${i}" value="${r.unit ?? ""}"></div>
            <div class="form-group"><label>Kuantiti</label><input type="number" data-k="qty" data-i="${i}" value="${r.qty||""}"></div>
            <div class="muted small">Jumlah: RM ${fmt(jumlah(r))}</div>
          </div>`).join("");
        rows.forEach((r,i) => { const s = rowsEl.querySelector(`select[data-i="${i}"]`); if (s) s.value = r.pkgId || ""; });
        sGrand.textContent = fmt(rows.reduce((s,r) => s + jumlah(r), 0));
      }
      rowsEl.addEventListener("input", e => {
        const i = +e.target.dataset.i, k = e.target.dataset.k;
        if (isNaN(i) || !k) return;
        rows[i][k] = e.target.type==="number" ? parseFloat(e.target.value)||0 : e.target.value;
        if (k === "pkgId") { const p = PACKAGES.find(x => x.id === +e.target.value); if (p) { rows[i].price = p.price; rows[i].pkgLabel = p.name; render(); return; } }
        render();
      });
      rowsEl.addEventListener("click", e => { const di = e.target.dataset.del; if (di != null) { rows.splice(+di,1); render(); } });
      document.getElementById("addRow").addEventListener("click", () => { rows.push({pkgId:"",pkgLabel:"",price:0,unit:1,qty:1}); render(); });
      rows.push({pkgId:"",pkgLabel:"",price:0,unit:1,qty:1}); render();

      document.getElementById("genPdf").addEventListener("click", () => {
        const c = findClient(sel.value);
        buildInvoice({
          invoiceNo: document.getElementById("invNo").value,
          date: fmtDate(document.getElementById("date").value),
          client: c || {name:"",address:"",phone:""},
          rows: rows.map(r => ({ pkg: PACKAGES.find(p=>p.id===+r.pkgId)?.name || r.pkgLabel || "", price:+r.price||0, unit:r.unit, qty:+r.qty||0, jumlah: jumlah(r) })),
          total: rows.reduce((s,r)=>s+jumlah(r),0)
        });
      });
      function fmtDate(iso) { if (!iso) return ""; const [y,m,d]=iso.split("-"); return `${d}/${m}/${y}`; }
    }
  </script>
</body>
</html>
