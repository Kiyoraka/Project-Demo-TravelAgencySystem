<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — HIJIR</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
  <div id="topbar"></div>
  <div class="container">
    <h1 class="text-center">Contact Us</h1>
    <div class="card">
      <p><strong>Address</strong><br><span id="addr" class="small muted"></span></p>
      <p><strong>Phone</strong> <span id="phone"></span></p>
      <p><strong>Email</strong> <span id="email"></span></p>
    </div>
    <form id="form" class="mt-2">
      <div class="form-group"><label>Name</label><input type="text" id="cName" required></div>
      <div class="form-group"><label>Email</label><input type="email" id="cEmail" required></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="cPhone"></div>
      <div class="form-group"><label>Message</label><textarea id="cMsg" required></textarea></div>
      <button type="submit" class="btn btn-block btn-lg">Send Message</button>
    </form>
  </div>
  <div id="bottomnav"></div>
  <script type="module">
    import { COMPANY } from "../shared/data.js";
    import { renderPublicLayout, showToast } from "./js/layout.js";
    renderPublicLayout("about"); // no dedicated contact tab in bottom nav; highlight about as closest
    document.getElementById("addr").textContent = COMPANY.address.join(" ");
    document.getElementById("phone").textContent = COMPANY.phone;
    document.getElementById("email").textContent = COMPANY.email;
    const pkg = new URLSearchParams(location.search).get("package");
    if (pkg) document.getElementById("cMsg").value = `Hi, I am interested in "${pkg}". Please share more details.`;
    document.getElementById("form").addEventListener("submit", e => {
      e.preventDefault();
      showToast("Message sent!");
      e.target.reset();
    });
  </script>
</body>
</html>
